<wicket:enclosure child="props-header">
	<div data-role="collapsible" data-collapsed="true">
		<h3>
			&nbsp;<span wicket:id="props-header" />
		</h3>
		<table data-role="table" data-mode="reflow"
			class="ui-responsive table-stroke ui-mini">
			<thead>
				<tr>
					<th data-priority="1" />
					<th data-priority="2" />
					<th data-priority="2" />
				</tr>
			</thead>
			<tbody>
				<tr wicket:id="prop-entry">
					<td wicket:id="prop-name" />
					<td>:</td>
					<td class="sp-txt-wrap" wicket:id="prop-value" />
				</tr>
			</tbody>
		</table>
	</div>
</wicket:enclosure>

</html>
