<wicket:remove>
The class UUID is used in corresponding .java file for PIN input.
_evaluateKeypressNumber(e) is defined in jquery-PrintFlowLite.js
</wicket:remove>
<script>
    $('.b8c6bb54-6163-11f0-b372-f37b360d4548').keypress(function(e) {
        return _evaluateKeypressNumber(e);
    });
</script>

<div data-role="header" data-theme="b">
	<h1 id="user-pin-reset-title" />
</div>

<div class="ui-content">

	<ul data-role="listview" data-inset="true">

		<li>
			<h3>
				<wicket:message key="pin-reset" />
			</h3>
		</li>

		<li>

			<label for="user-pin-reset">
				<wicket:message key="pin" />
			</label>
			<wicket:panel wicket:id="user-pin-reset-panel" />

			<label for="user-pin-reset-confirm">
				<wicket:message key="pin-confirm" />
			</label>
			<wicket:panel wicket:id="user-pin-reset-confirm-panel" />
		</li>
		<li>
			<div>
				<button id="button-user-pin-reset"
					class="ui-btn ui-btn-inline ui-btn-icon-left ui-icon-check"
					wicket:id="button-apply" />

				<a href="#" tabindex="0"
					class="ui-btn ui-btn-inline ui-btn-icon-left ui-icon-back"
					data-rel="back" data-direction="reverse" wicket:id="button-cancel" />
			</div>
		</li>
	</ul>
</div>

<wicket:remove>
	<!-- 
THIS POPUP MUST BE PRESENT IN EVERY PAGE AND DIALOG 
-->
</wicket:remove>
<div data-role="popup" data-position-to="window"
	class="sp-msg-popup ui-content" />
</html>
