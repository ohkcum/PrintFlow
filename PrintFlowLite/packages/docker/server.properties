# PrintFlowLite Server Properties for Docker Runtime

#------------------------------------------------------------
# Server ports
#------------------------------------------------------------
server.port=8080
server.ssl.port=8443

#------------------------------------------------------------
# Database Settings - PostgreSQL
#------------------------------------------------------------
database.type=PostgreSQL
database.driver=org.postgresql.Driver
database.url=jdbc:postgresql://postgres:5432/printflowlite
database.user=printflowlite
database.password=change-me-in-docker-env

#------------------------------------------------------------
# Database Connection Pool
#------------------------------------------------------------
database.connection.pool.max=50
database.connection.pool.min=5

#------------------------------------------------------------
# Visitor Settings
#------------------------------------------------------------
visitor.organization=PrintFlowLite Docker

#------------------------------------------------------------
# Temp directory
#------------------------------------------------------------
app.dir.tmp=/opt/printflowlite/tmp
