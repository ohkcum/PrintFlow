name: Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build PrintFlowLite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Build all packages
        run: mvn clean install -DskipTests --batch-mode

      - name: Build server WAR
        run: mvn package -pl packages/server -DskipTests --batch-mode

      - name: Upload server WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: printflowlite-server
          path: packages/server/target/printflowlite-server-*.war
          retention-days: 7

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: build

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: printflowlite
          POSTGRES_PASSWORD: printflowlite
          POSTGRES_DB: printflowlite
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Run all tests
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/printflowlite
          DATABASE_USER: printflowlite
          DATABASE_PASSWORD: printflowlite
        run: mvn test --batch-mode

  validate:
    name: Validate Project
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Validate Maven POMs
        run: mvn validate --batch-mode

      - name: Check for uncommitted documentation
        run: |
          if git diff --name-only | grep -q "^docs/"; then
            echo "WARNING: Documentation changes detected. Ensure all docs are intentional."
          fi
