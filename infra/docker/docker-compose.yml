version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: printflow-postgres
    environment:
      POSTGRES_USER: printflow
      POSTGRES_PASSWORD: printflow
      POSTGRES_DB: printflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U printflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: printflow-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    container_name: printflow-api
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://printflow:printflow@postgres:5432/printflow
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: ${AUTH_SECRET:-change-this-in-production}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker
    container_name: printflow-worker
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://printflow:printflow@postgres:5432/printflow
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
